name: T1 (Shards 0–4)
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4]
    env:
      SHARD_STEP: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome (Stable)
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install System Dependencies
        run: |
          sudo apt-get install -y libnss3 libxi6 libgbm1 libasound2t64

      - name: Install Python Packages
        run: |
          pip install undetected-chromedriver selenium==4.21.0 beautifulsoup4 gspread

      - name: Prepare Credentials
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json
          FILE="checkpoint_group1_${{ matrix.shard }}.txt"
          if [ ! -f "$FILE" ]; then echo "0" > "$FILE"; fi

      - name: Run Scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          CHECKPOINT_FILE: checkpoint_group1_${{ matrix.shard }}.txt
          PYTHONUNBUFFERED: "1"
        run: python run_scraper.py
