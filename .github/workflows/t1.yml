name: T1 (Shards 0–4)
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4]
    env:
      SHARD_STEP: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install undetected-chromedriver selenium beautifulsoup4 gspread
          # These are often needed for Chrome on Ubuntu runners
          sudo apt-get update
          sudo apt-get install -y libnss3 libgconf-2-4 libxi6 libgbm1

      - name: Prepare Files
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json
          FILE="checkpoint_group1_${{ matrix.shard }}.txt"
          if [ ! -f "$FILE" ]; then echo "0" > "$FILE"; fi

      - name: Run Scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          CHECKPOINT_FILE: checkpoint_group1_${{ matrix.shard }}.txt
          PYTHONUNBUFFERED: "1"
        run: python run_scraper.py
