name: T1 (Shards 0–4)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4]

    env:
      SHARD_STEP: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libxi6 libgbm1 libasound2t64

      - name: Install Python Packages
        run: |
          pip install selenium==4.21.0 webdriver-manager beautifulsoup4 gspread

      # ✅ FIXED: Proper JSON writing (NO echo)
      - name: Create credentials.json
        run: |
          printf "%s" '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json

      - name: Create cookies.json
        run: |
          printf "%s" '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json

      # ✅ Optional debug (remove after testing)
      - name: Debug JSON files
        run: |
          echo "---- credentials.json ----"
          head -n 5 credentials.json
          echo "---- cookies.json ----"
          head -n 5 cookies.json

      - name: Create checkpoint file
        run: |
          FILE="checkpoint_group1_${{ matrix.shard }}.txt"
          if [ ! -f "$FILE" ]; then echo "0" > "$FILE"; fi

      - name: Run Scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          CHECKPOINT_FILE: checkpoint_group1_${{ matrix.shard }}.txt
          PYTHONUNBUFFERED: "1"
        run: python run_scraper.py
