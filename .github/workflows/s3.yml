name: T3 (Shards 10–14)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  scrape:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [10, 11, 12, 13, 14]

    env:
      SHARD_STEP: 20

    steps:
      - name: Checkout Code
        uses: :contentReference[oaicite:0]{index=0}@v4

      - name: Set up Python
        uses: :contentReference[oaicite:1]{index=1}@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install selenium beautifulsoup4 gspread webdriver-manager

      - name: Setup Credentials
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json

      - name: Prepare Checkpoint
        run: |
          FILE="checkpoint_group3_${{ matrix.shard }}.txt"
          if [ ! -f "$FILE" ]; then echo "1" > "$FILE"; fi

      - name: Run Scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          CHECKPOINT_FILE: checkpoint_group3_${{ matrix.shard }}.txt
        run: python run_scraper.py
