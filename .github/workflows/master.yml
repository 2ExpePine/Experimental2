name: Master Scraper Controller

on:
  workflow_dispatch:

# --- ADD THIS PERMISSIONS BLOCK ---
permissions:
  actions: write
  contents: read
# ----------------------------------

jobs:
  t1_t2_parallel:
    name: Run T1 and T2
    runs-on: ubuntu-latest
    steps:
      - name: Trigger T1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 't1.yml',
              ref: 'main'
            })
      - name: Trigger T2
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 't2.yml',
              ref: 'main'
            })

  t3_delayed:
    name: Wait 10m then Run T3
    needs: t1_t2_parallel
    runs-on: ubuntu-latest
    steps:
      - name: Delay
        run: sleep 600
      - name: Trigger T3
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 't3.yml',
              ref: 'main'
            })

  t4_delayed:
    name: Wait 10m then Run T4
    needs: t3_delayed
    runs-on: ubuntu-latest
    steps:
      - name: Delay
        run: sleep 600
      - name: Trigger T4
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 't4.yml',
              ref: 'main'
            })
